<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de API Key</title>
</head>
<body>
    <h1>Resultado de la Clave</h1>
    <pre id="output">Cargando...</pre>
    <script>
        const apiKey = "sk-406de2a3fed947a380531d8be14e9edb";
        // Intentar como Google AI
        fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('output').textContent = "Google AI Result: " + JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('output').textContent = "Error: " + err.message;
            });
    </script>
</body>
</html>
